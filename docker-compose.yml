version: "3.9"

services:
  frontend:
    build: ../practices/practices
    ports:
      - "3000:5173"
    volumes:
      - ../practices/practices:/app
      - frontend_node_modules:/app/node_modules 
    command: npm run dev -- --host
    environment:
      - VITE_API_BASE_URL=http://localhost:5002
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: ./server
    ports:
      - "5002:5002"
    volumes:
      - ./server:/app
      - backend_node_modules:/app/node_modules    
    command: npm run server
    environment:
      - NODE_ENV=development
      - PORT=5002
      - CORS_ORIGIN=http://localhost:3000
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  frontend_node_modules:
  backend_node_modules:
